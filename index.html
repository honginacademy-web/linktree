<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Links</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <section class="profile">
      <div class="avatar">
        <img src="https://github.com/github.png" alt="Profile" />
      </div>
      <h1 class="name">이름을 입력하세요</h1>
      <p class="bio">한 줄 소개를 입력하세요</p>
    </section>

    <section class="links">
      <a class="link-card" href="#" target="_blank" rel="noopener noreferrer">
        <span class="link-icon">🐙</span>
        <span class="link-label">GitHub</span>
        <span class="link-arrow">→</span>
      </a>
      <a class="link-card" href="#" target="_blank" rel="noopener noreferrer">
        <span class="link-icon">💼</span>
        <span class="link-label">포트폴리오</span>
        <span class="link-arrow">→</span>
      </a>
      <a class="link-card" href="#" target="_blank" rel="noopener noreferrer">
        <span class="link-icon">✉️</span>
        <span class="link-label">이메일</span>
        <span class="link-arrow">→</span>
      </a>
      <a class="link-card" href="#" target="_blank" rel="noopener noreferrer">
        <span class="link-icon">📝</span>
        <span class="link-label">블로그</span>
        <span class="link-arrow">→</span>
      </a>
      <a class="link-card link-card--primary" href="#" target="_blank" rel="noopener noreferrer">
        <span class="link-icon">🚀</span>
        <span class="link-label">주요 프로젝트</span>
        <span class="link-arrow">→</span>
      </a>
    </section>

    <footer class="footer">
      <p>Made with ❤️</p>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
